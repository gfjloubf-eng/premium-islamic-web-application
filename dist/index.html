عْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ",reference:"سورة البقرة: 255",count:1,category:"morning",benefits:"من قالها حين يصبح أُجير من الجن حتى يمسي، ومن قالها حين يمسي أُجير من الجن حتى يصبح"},{id:2,title:"سورة الإخلاص",content:`بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ
قُلْ هُوَ اللَّهُ أَحَدٌ ۝ اللَّهُ الصَّمَدُ ۝ لَمْ يَلِدْ وَلَمْ يُولَدْ ۝ وَلَمْ يَكُن لَّهُ كُفُوًا أَحَدٌ`,reference:"سورة الإخلاص",count:3,category:"morning",benefits:"من قرأها ثلاث مرات حين يصبح وحين يمسي كفته من كل شيء"},{id:3,title:"سورة الفلق",content:`بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ
قُلْ أَعُوذُ بِرَبِّ الْفَلَقِ ۝ مِن شَرِّ مَا خَلَقَ ۝ وَمِن شَرِّ غَاسِقٍ إِذَا وَقَبَ ۝ وَمِن شَرِّ النَّفَّاثَاتِ فِي الْعُقَدِ ۝ وَمِن شَرِّ حَاسِدٍ إِذَا حَسَدَ`,reference:"سورة الفلق",count:3,category:"morning",benefits:"من قرأها ثلاث مرات حين يصبح وحين يمسي كفته من كل شيء"},{id:4,title:"سورة الناس",content:`بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ
قُلْ أَعُوذُ بِرَبِّ النَّاسِ ۝ مَلِكِ النَّاسِ ۝ إِلَٰهِ النَّاسِ ۝ مِن شَرِّ الْوَسْوَاسِ الْخَنَّاسِ ۝ الَّذِي يُوَسْوِسُ فِي صُدُورِ النَّاسِ ۝ مِنَ الْجِنَّةِ وَالنَّاسِ`,reference:"سورة الناس",count:3,category:"morning",benefits:"من قرأها ثلاث مرات حين يصبح وحين يمسي كفته من كل شيء"},{id:5,title:"سيد الاستغفار",content:"اللَّهُمَّ أَنْتَ رَبِّي لَا إِلَهَ إِلَّا أَنْتَ، خَلَقْتَنِي وَأَنَا عَبْدُكَ، وَأَنَا عَلَى عَهْدِكَ وَوَعْدِكَ مَا اسْتَطَعْتُ، أَعُوذُ بِكَ مِنْ شَرِّ مَا صَنَعْتُ، أَبُوءُ لَكَ بِنِعْمَتِكَ عَلَيَّ، وَأَبُوءُ بِذَنْبِي فَاغْفِرْ لِي فَإِنَّهُ لَا يَغْفِرُ الذُّنُوبَ إِلَّا أَنْتَ",reference:"رواه البخاري",count:1,category:"morning",benefits:"من قالها موقناً بها حين يمسي فمات من ليلته دخل الجنة، ومن قالها موقناً بها حين يصبح فمات من يومه دخل الجنة"},{id:6,title:"أصبحنا وأصبح الملك لله",content:"أَصْبَحْنَا وَأَصْبَحَ الْمُلْكُ لِلَّهِ، وَالْحَمْدُ لِلَّهِ، لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ، رَبِّ أَسْأَلُكَ خَيْرَ مَا فِي هَذَا الْيَوْمِ وَخَيْرَ مَا بَعْدَهُ، وَأَعُوذُ بِكَ مِنْ شَرِّ مَا فِي هَذَا الْيَوْمِ وَشَرِّ مَا بَعْدَهُ",reference:"رواه مسلم",count:1,category:"morning",benefits:"ذكر الصباح المبارك"},{id:7,title:"اللهم بك أصبحنا",content:"اللَّهُمَّ بِكَ أَصْبَحْنَا، وَبِكَ أَمْسَيْنَا، وَبِكَ نَحْيَا، وَبِكَ نَمُوتُ، وَإِلَيْكَ النُّشُورُ",reference:"رواه الترمذي",count:1,category:"morning",benefits:"التوكل على الله والتسليم لأمره"},{id:8,title:"اللهم عافني في بدني",content:"اللَّهُمَّ عَافِنِي فِي بَدَنِي، اللَّهُمَّ عَافِنِي فِي سَمْعِي، اللَّهُمَّ عَافِنِي فِي بَصَرِي، لَا إِلَهَ إِلَّا أَنْتَ. اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْكُفْرِ وَالْفَقْرِ، وَأَعُوذُ بِكَ مِنْ عَذَابِ الْقَبْرِ، لَا إِلَهَ إِلَّا أَنْتَ",reference:"رواه أبو داود",count:3,category:"morning",benefits:"حفظ البدن والسمع والبصر"},{id:9,title:"حسبي الله لا إله إلا هو",content:"حَسْبِيَ اللَّهُ لَا إِلَهَ إِلَّا هُوَ عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ",reference:"رواه أبو داود",count:7,category:"morning",benefits:"من قالها سبع مرات حين يصبح وحين يمسي كفاه الله ما أهمه من أمر الدنيا والآخرة"},{id:10,title:"بسم الله الذي لا يضر",content:"بِسْمِ اللَّهِ الَّذِي لَا يَضُرُّ مَعَ اسْمِهِ شَيْءٌ فِي الْأَرْضِ وَلَا فِي السَّمَاءِ وَهُوَ السَّمِيعُ الْعَلِيمُ",reference:"رواه أبو داود والترمذي",count:3,category:"morning",benefits:"من قالها ثلاث مرات حين يصبح وحين يمسي لم يضره شيء"},{id:11,title:"رضيت بالله رباً",content:"رَضِيتُ بِاللَّهِ رَبًّا، وَبِالْإِسْلَامِ دِينًا، وَبِمُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ نَبِيًّا",reference:"رواه أبو داود والترمذي",count:3,category:"morning",benefits:"من قالها ثلاث مرات حين يصبح وحين يمسي كان حقاً على الله أن يرضيه يوم القيامة"},{id:12,title:"سبحان الله وبحمده",content:"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",reference:"رواه مسلم",count:100,category:"morning",benefits:"من قالها حين يصبح وحين يمسي مائة مرة لم يأت أحد يوم القيامة بأفضل مما جاء به إلا أحد قال مثل ما قال أو زاد عليه"},{id:13,title:"لا إله إلا الله وحده لا شريك له",content:"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",reference:"متفق عليه",count:10,category:"morning",benefits:"كانت له عدل عشر رقاب، وكتبت له مائة حسنة، ومحيت عنه مائة سيئة، وكانت له حرزاً من الشيطان"},{id:14,title:"أصبحنا على فطرة الإسلام",content:"أَصْبَحْنَا عَلَى فِطْرَةِ الْإِسْلَامِ، وَعَلَى كَلِمَةِ الْإِخْلَاصِ، وَعَلَى دِينِ نَبِيِّنَا مُحَمَّدٍ صَلَّى اللَّهُ عَلَيْهِ وَسَلَّمَ، وَعَلَى مِلَّةِ أَبِينَا إِبْرَاهِيمَ، حَنِيفًا مُسْلِمًا وَمَا كَانَ مِنَ الْمُشْرِكِينَ",reference:"رواه أحمد",count:1,category:"morning",benefits:"التمسك بالفطرة السليمة والدين الحنيف"},{id:15,title:"سبحان الله وبحمده عدد خلقه",content:"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ عَدَدَ خَلْقِهِ، وَرِضَا نَفْسِهِ، وَزِنَةَ عَرْشِهِ، وَمِدَادَ كَلِمَاتِهِ",reference:"رواه مسلم",count:3,category:"morning",benefits:"تعدل ما قاله الذاكر من أول النهار إلى آخره"},{id:16,title:"اللهم إني أسألك العفو والعافية",content:"اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي الدُّنْيَا وَالْآخِرَةِ، اللَّهُمَّ إِنِّي أَسْأَلُكَ الْعَفْوَ وَالْعَافِيَةَ فِي دِينِي وَدُنْيَايَ وَأَهْلِي وَمَالِي",reference:"رواه ابن ماجه",count:1,category:"morning",benefits:"طلب العفو والعافية في كل شيء"},{id:17,title:"اللهم إني أعوذ بك من الهم والحزن",content:"اللَّهُمَّ إِنِّي أَعُوذُ بِكَ مِنَ الْهَمِّ وَالْحَزَنِ، وَأَعُوذُ بِكَ مِنَ الْعَجْزِ وَالْكَسَلِ، وَأَعُوذُ بِكَ مِنَ الْجُبْنِ وَالْبُخْلِ، وَأَعُوذُ بِكَ مِنْ غَلَبَةِ الدَّيْنِ وَقَهْرِ الرِّجَالِ",reference:"رواه أبو داود",count:1,category:"morning",benefits:"الاستعاذة من كل ما يعيق العبد في حياته"},{id:18,title:"أستغفر الله وأتوب إليه",content:"أَسْتَغْفِرُ اللَّهَ وَأَتُوبُ إِلَيْهِ",reference:"متفق عليه",count:100,category:"morning",benefits:"كان رسول الله ﷺ يستغفر الله في اليوم مائة مرة"}],Rg=[{id:101,title:"آية الكرسي",content:"اللَّهُ لَا إِلَٰهَ إِلَّا هُوَ الْحَيُّ الْقَيُّومُ ۚ لَا تَأْخُذُهُ سِنَةٌ وَلَا نَوْمٌ ۚ لَّهُ مَا فِي السَّمَاوَاتِ وَمَا فِي الْأَرْضِ ۗ مَن ذَا الَّذِي يَشْفَعُ عِندَهُ إِلَّا بِإِذْنِهِ ۚ يَعْلَمُ مَا بَيْنَ أَيْدِيهِمْ وَمَا خَلْفَهُمْ ۖ وَلَا يُحِيطُونَ بِشَيْءٍ مِّنْ عِلْمِهِ إِلَّا بِمَا شَاءَ ۚ وَسِعَ كُرْسِيُّهُ السَّمَاوَاتِ وَالْأَرْضَ ۖ وَلَا يَئُودُهُ حِفْظُهُمَا ۚ وَهُوَ الْعَلِيُّ الْعَظِيمُ",reference:"سورة البقرة: 255",count:1,category:"evening",benefits:"من قالها حين يمسي أُجير من الجن حتى يصبح"},{id:102,title:"سورة الإخلاص",content:`بِسْمِ اللَّهِ الرَّحْمَنِ الرَّحِيمِ

عَلَيْهِ تَوَكَّلْتُ وَهُوَ رَبُّ الْعَرْشِ الْعَظِيمِ",reference:"رواه أبو داود",count:7,category:"evening",benefits:"من قالها سبع مرات كفاه الله ما أهمه"},{id:111,title:"سبحان الله وبحمده",content:"سُبْحَانَ اللَّهِ وَبِحَمْدِهِ",reference:"رواه مسلم",count:100,category:"evening",benefits:"من قالها حين يمسي مائة مرة حطت عنه خطاياه وإن كانت مثل زبد البحر"},{id:112,title:"لا إله إلا الله وحده لا شريك له",content:"لَا إِلَهَ إِلَّا اللَّهُ وَحْدَهُ لَا شَرِيكَ لَهُ، لَهُ الْمُلْكُ وَلَهُ الْحَمْدُ، وَهُوَ عَلَى كُلِّ شَيْءٍ قَدِيرٌ",reference:"متفق عليه",count:10,category:"evening",benefits:"كتبت له مائة حسنة ومحيت عنه مائة سيئة"}],Og=[{id:201,title:"دعاء النوم",content:"بِاسْمِكَ اللَّهُمَّ أَمُوتُ وَأَحْيَا",reference:"رواه البخاري",count:1,category:"sleep",benefits:"من السنة قوله عند النوم"},{id:202,title:"التسبيح والتحميد والتكبير",content:"سُبْحَانَ اللَّهِ (33) وَالْحَمْدُ لِلَّهِ (33) وَاللَّهُ أَكْبَرُ (34)",reference:"متفق عليه",count:1,category:"sleep",benefits:"أوصى بها النبي ﷺ فاطمة وعلياً رضي الله عنهما"},{id:203,title:"اللهم قني عذابك",content:"اللَّهُمَّ قِنِي عَذَابَكَ يَوْمَ تَبْعَثُ عِبَادَكَ",reference:"رواه أبو داود والترمذي",count:3,category:"sleep",benefits:"الاستعاذة من عذاب يوم القيامة"},{id:204,title:"دعاء الاستيقاظ من النوم",content:"الْحَمْدُ لِلَّهِ الَّذِي أَحْيَانَا بَعْدَمَا أَمَاتَنَا وَإِلَيْهِ النُّشُورُ",reference:"رواه البخاري",count:1,category:"sleep",benefits:"شكر الله على نعمة الحياة"}],Vg=[{id:301,title:"أستغفر الله بعد الصلاة",content:"أَسْتَغْفِرُ اللَّهَ، أَسْتَغْفِرُ اللَّهَ، أَسْتَغْفِرُ اللَّهَ",reference:"رواه مسلم",count:3,category:"prayer",benefits:"الاستغفار بعد كل صلاة"},{id:302,title:"اللهم أنت السلام",content:"اللَّهُمَّ أَنْتَ السَّلَامُ وَمِنْكَ السَّلَامُ، تَبَارَكْتَ يَا ذَا الْجَلَالِ وَالْإِكْرَامِ",reference:"رواه مسلم",count:1,category:"prayer",benefits:"من أذكار ما بعد الصلاة"},{id:303,title:"سبحان الله بعد الصلاة",content:"سُبْحَانَ اللَّهِ وَالْحَمْدُ لِلَّهِ وَاللَّهُ أَكْبَرُ",reference:"رواه مسلم",count:33,category:"prayer",benefits:"التسبيح والتحميد والتكبير بعد الصلاة"}],cf=[{id:401,title:"دعاء آدم عليه السلام",content:"رَبَّنَا ظَلَمْنَا أَنفُسَنَا وَإِن لَّمْ تَغْفِرْ لَنَا وَتَرْحَمْنَا لَنَكُونَنَّ مِنَ الْخَاسِرِينَ",reference:"سورة الأعراف: 23",count:1,category:"prophets",benefits:"دعاء التوبة والاستغفار"},{id:402,title:"دعاء نوح عليه السلام",content:"رَبِّ اغْفِرْ لِي وَلِوَالِدَيَّ وَلِمَن دَخَلَ بَيْتِيَ مُؤْمِنًا وَلِلْمُؤْمِنِينَ وَالْمُؤْمِنَاتِ",reference:"سورة نوح: 28",count:1,category:"prophets",benefits:"الدعاء للوالدين والمؤمنين"},{id:403,title:"دعاء إبراهيم عليه السلام",content:"رَبِّ اجْعَلْنِي مُقِيمَ الصَّلَاةِ وَمِن ذُرِّيَّتِي ۚ رَبَّنَا وَتَقَبَّلْ دُعَاءِ",reference:"سورة إبراهيم: 40",count:1,category:"prophets",benefits:"الدعاء بإقامة الصلاة"},{id:404,title:"دعاء موسى عليه السلام",content:"رَبِّ اشْرَحْ لِي صَدْرِي ۝ وَيَسِّرْ لِي أَمْرِي ۝ وَاحْلُلْ عُقْدَةً مِّن لِّسَانِي ۝ يَفْقَهُوا قَوْلِي",reference:"سورة طه: 25-28",count:1,category:"prophets",benefits:"شرح الصدر وتيسير الأمور"},{id:405,title:"دعاء يونس عليه السلام",content:"لَّا إِلَٰهَ إِلَّا أَنتَ سُبْحَانَكَ إِنِّي كُنتُ مِنَ الظَّالِمِينَ",reference:"سورة الأنبياء: 87",count:1,category:"prophets",benefits:"ما دعا بها مسلم في شيء إلا استجاب الله له"},{id:406,title:"دعاء أيوب عليه السلام",content:"أَنِّي مَسَّنِيَ الضُّرُّ وَأَنتَ أَرْحَمُ الرَّاحِمِينَ",reference:"سورة الأنبياء: 83",count:1,category:"prophets",benefits:"التضرع إلى الله عند الشدة"},{id:407,title:"دعاء سليمان عليه السلام",content:"رَبِّ أَوْزِعْنِي أَنْ أَشْكُرَ نِعْمَتَكَ الَّتِي أَنْعَمْتَ عَلَيَّ وَعَلَىٰ وَالِدَيَّ وَأَنْ أَعْمَلَ صَالِحًا تَرْضَاهُ",reference:"سورة النمل: 19",count:1,category:"prophets",benefits:"شكر النعم والعمل الصالح"},{id:408,title:"دعاء زكريا عليه السلام",content:"رَبِّ لَا تَذَرْنِي فَرْدًا وَأَنتَ خَيْرُ الْوَارِثِينَ",reference:"سورة الأنبياء: 89",count:1,category:"prophets",benefits:"الدعاء بالذرية الصالحة"}],ff=[{id:501,title:"ربنا آتنا في الدنيا حسنة",content:"رَبَّنَا آتِنَا ف
